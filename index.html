<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital clock</title>
</head>
<body style="background-color: #212121; color: #999;">
  <p>your local time </p>
  <div style="background-color: yellow; height: 30px; width: 90px;"   class="local"></div>

  <script>
const local=document.querySelector('.local')
setInterval(function(){
  let date=new Date();
  local.innerHTML=date.toLocaleTimeString();
},1000)


  </script>
  
</body>
</html>
